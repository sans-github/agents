<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FEATURE_NAME}}</title>
<style>
:root {
  --blue: #4f6ef7;
  --blue-light: #eef1fe;
  --purple: #7c5cfc;
  --green: #22c55e;
  --red: #f87171;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --bg: #f8fafc;
  --white: #ffffff;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
  --shadow-lg: 0 8px 32px rgba(79,110,247,.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── Header ── */
.hero {
  background: linear-gradient(135deg, #4f6ef7 0%, #7c5cfc 100%);
  padding: 40px 24px 56px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.18); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 99px; padding: 5px 14px;
  font-size: 12px; font-weight: 600; color: #fff; letter-spacing: .04em;
  text-transform: uppercase; margin-bottom: 14px;
}
.hero h1 {
  font-size: clamp(24px, 5vw, 36px); font-weight: 800; color: #fff;
  letter-spacing: -.02em; line-height: 1.2; margin-bottom: 10px;
}
.hero p {
  font-size: 15px; color: rgba(255,255,255,.8); max-width: 480px;
  margin: 0 auto 20px; line-height: 1.6;
}
.stage-counter {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.15); border-radius: 99px; padding: 6px 16px;
  font-size: 13px; font-weight: 600; color: #fff;
}
.counter-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; }

/* ── Main card ── */
.container { max-width: 660px; margin: -24px auto 0; padding: 0 16px; position: relative; }
.card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}

/* ── Legend ── */
.legend {
  display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: #fafbff;
}
.legend-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-right: 4px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); }
.swatch-toggle { width: 32px; height: 18px; border-radius: 99px; background: var(--blue); position: relative; flex-shrink: 0; }
.swatch-toggle::after { content: ''; position: absolute; top: 3px; right: 3px; width: 12px; height: 12px; border-radius: 50%; background: #fff; }
.swatch-gate { font-size: 15px; line-height: 1; }

/* ── Section header ── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 12px;
}
.section-head h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.select-all { font-size: 12px; font-weight: 600; color: var(--blue); cursor: pointer; border: none; background: none; padding: 4px 0; }
.select-all:hover { text-decoration: underline; }

/* ── Stage row ── */
.stage { border-bottom: 1px solid var(--border); transition: background .15s; }
.stage:last-child { border-bottom: none; }
.stage-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 24px; cursor: pointer; user-select: none;
}
.stage.locked .stage-row { cursor: default; }
.stage-row:hover:not(.locked *) { background: #fafbff; }

.stage-icon {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  background: var(--blue-light);
  transition: background .2s, transform .15s;
}
.stage.inactive .stage-icon { background: #f1f5f9; filter: grayscale(1) opacity(.5); }

.stage-body { flex: 1; min-width: 0; }
.stage-name { font-size: 14px; font-weight: 700; color: var(--text); transition: color .15s; }
.stage-desc { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.4; transition: color .15s; }
.stage.inactive .stage-name { color: #94a3b8; }
.stage.inactive .stage-desc { color: #cbd5e1; }

.always-badge {
  font-size: 11px; font-weight: 700; letter-spacing: .03em;
  color: var(--purple); background: #f3eeff;
  border-radius: 99px; padding: 3px 10px; white-space: nowrap; flex-shrink: 0;
}

/* Toggle switch */
.toggle {
  width: 40px; height: 22px; border-radius: 99px; flex-shrink: 0;
  background: var(--blue); border: none; cursor: pointer;
  position: relative; transition: background .2s;
  box-shadow: 0 1px 4px rgba(79,110,247,.3);
}
.toggle::after {
  content: ''; position: absolute; top: 3px; right: 3px;
  width: 16px; height: 16px; border-radius: 50%; background: #fff;
  transition: transform .2s, right .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle.off { background: #e2e8f0; box-shadow: none; }
.toggle.off::after { right: auto; left: 3px; }
.toggle:disabled { opacity: .45; cursor: default; }

/* ── Gate rows ── */
.gates { background: #fafbff; }
.gate-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 24px 10px 74px;
  border-top: 1px solid var(--border);
  transition: opacity .15s;
}
.gate-row.dimmed { opacity: .35; pointer-events: none; }
.gate-icon { font-size: 14px; flex-shrink: 0; }
.gate-label { flex: 1; font-size: 13px; color: #475569; line-height: 1.4; }
.gate-toggle {
  width: 32px; height: 18px; border-radius: 99px; flex-shrink: 0;
  background: var(--blue); border: none; cursor: pointer;
  position: relative; transition: background .2s;
}
.gate-toggle::after {
  content: ''; position: absolute; top: 2px; right: 2px;
  width: 14px; height: 14px; border-radius: 50%; background: #fff;
  transition: transform .2s, right .2s;
  box-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.gate-toggle.off { background: #e2e8f0; }
.gate-toggle.off::after { right: auto; left: 2px; }
.gate-toggle:disabled { opacity: .45; cursor: default; }

/* ── Config section ── */
.config-section { padding: 20px 24px; border-top: 1px solid var(--border); }
.config-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; display: block; }
.deploy-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.deploy-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: #475569;
  transition: border-color .15s, background .15s, color .15s;
  user-select: none;
}
.deploy-opt:hover { border-color: var(--blue); color: var(--blue); }
.deploy-opt.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); font-weight: 700; }
.deploy-opt input { display: none; }
.deploy-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
textarea.context-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px 14px; font-size: 13px; font-family: inherit;
  color: var(--text); resize: vertical; min-height: 72px;
  outline: none; transition: border-color .15s;
  background: var(--bg);
}
textarea.context-input:focus { border-color: var(--blue); background: #fff; }
textarea.context-input::placeholder { color: #94a3b8; }

/* ── Footer ── */
.footer { padding: 20px 24px 24px; border-top: 1px solid var(--border); }
.confirm-btn {
  width: 100%; padding: 14px 24px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
  color: #fff; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: -.01em;
  transition: opacity .15s, transform .1s, box-shadow .15s;
  box-shadow: 0 4px 14px rgba(79,110,247,.35);
  position: relative; overflow: hidden;
}
.confirm-btn:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,110,247,.45); }
.confirm-btn:active { transform: translateY(0); }
.confirm-btn.done {
  background: linear-gradient(135deg, #16a34a, #15803d);
  box-shadow: 0 4px 14px rgba(22,163,74,.35);
}
.success-hint {
  display: none; text-align: center; margin-top: 14px;
  font-size: 13px; color: var(--muted); line-height: 1.5;
}
.success-hint strong { color: var(--text); }
.success-hint.visible { display: block; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">⚡ Workflow Setup</div>
  <h1>{{FEATURE_NAME}}</h1>
  <p>{{PROJECT_SUMMARY}}</p>
  <div class="stage-counter">
    <span class="counter-dot"></span>
    <span id="counter-text">Loading...</span>
  </div>
</div>

<div class="container">
  <div class="card">

    <div class="legend">
      <span class="legend-label">Legend</span>
      <span class="legend-item"><span class="swatch-toggle"></span> Toggle a whole stage on / off</span>
      <span class="legend-item"><span class="swatch-gate">👤</span> Human review gate inside a stage</span>
    </div>

    <div class="section-head">
      <h2>Delivery Stages</h2>
      <button class="select-all" onclick="setAll(true)">Enable all</button>
    </div>

    <div id="stages-list"></div>

    <div class="config-section">
      <span class="config-label">Where does this ship?</span>
      <div class="deploy-grid" id="deploy-grid">
        <label class="deploy-opt selected"><input type="radio" name="deploy" value="local" checked><span class="deploy-dot"></span>Local only</label>
        <label class="deploy-opt"><input type="radio" name="deploy" value="existing AWS infra"><span class="deploy-dot"></span>Existing AWS</label>
        <label class="deploy-opt"><input type="radio" name="deploy" value="new AWS infra"><span class="deploy-dot"></span>New AWS infra</label>
        <label class="deploy-opt"><input type="radio" name="deploy" value="TBD"><span class="deploy-dot"></span>TBD</label>
      </div>
    </div>

    <div class="config-section" style="padding-top:0">
      <span class="config-label">Anything Claude should know upfront?</span>
      <textarea class="context-input" id="extra-context" placeholder="Sketch notes, constraints, tech decisions, team preferences… or leave blank."></textarea>
    </div>

    <div class="footer">
      <button class="confirm-btn" id="confirm-btn" onclick="confirmConfig()">Lock in my workflow →</button>
      <p class="success-hint" id="success-hint">
        ✅ Copied to clipboard. Switch back to Claude and type <strong>done</strong> to continue.
      </p>
    </div>

  </div>
</div>

<script>
const STAGE_ICONS = ['🔍','🎨','🏗️','⚙️','🧪','📦','📝','🚀'];

const STAGES = {{STAGES_JSON}};

function buildStages() {
  const list = document.getElementById('stages-list');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage' + (s.locked ? ' locked' : '') + (!s.active ? ' inactive' : '');
    el.dataset.idx = i;

    const gatesHtml = (s.gates || []).map((g, gi) => `
      <div class="gate-row${!s.active ? ' dimmed' : ''}" id="gate-${i}-${gi}">
        <span class="gate-icon">👤</span>
        <span class="gate-label">${g.label}</span>
        <button class="gate-toggle${g.active ? '' : ' off'}${s.locked ? '' : ''}"
          ${s.locked ? 'disabled' : ''}
          onclick="toggleGate(event,${i},${gi})" title="${g.active ? 'Skip this review' : 'Enable this review'}"></button>
      </div>`).join('');

    el.innerHTML = `
      <div class="stage-row" onclick="${s.locked ? '' : 'toggleStage(' + i + ')'}">
        <div class="stage-icon">${STAGE_ICONS[i] || '📌'}</div>
        <div class="stage-body">
          <div class="stage-name">${s.name}</div>
          <div class="stage-desc">${s.desc}</div>
        </div>
        ${s.locked
          ? '<span class="always-badge">Always on</span>'
          : `<button class="toggle${s.active ? '' : ' off'}" onclick="event.stopPropagation();toggleStage(${i})" title="${s.active ? 'Skip this stage' : 'Enable this stage'}"></button>`}
      </div>
      ${gatesHtml ? '<div class="gates">' + gatesHtml + '</div>' : ''}`;
    list.appendChild(el);
  });
  updateCounter();
}

function toggleStage(i) {
  const s = STAGES[i];
  s.active = !s.active;
  const el = document.querySelector('.stage[data-idx="' + i + '"]');
  el.classList.toggle('inactive', !s.active);
  el.querySelector('.toggle').classList.toggle('off', !s.active);
  el.querySelectorAll('.gate-row').forEach(r => r.classList.toggle('dimmed', !s.active));
  el.querySelectorAll('.gate-toggle').forEach(b => b.disabled = !s.active);
  updateCounter();
}

function toggleGate(e, si, gi) {
  e.stopPropagation();
  const g = STAGES[si].gates[gi];
  g.active = !g.active;
  document.getElementById('gate-' + si + '-' + gi).querySelector('.gate-toggle').classList.toggle('off', !g.active);
}

function setAll(val) {
  STAGES.forEach((s, i) => { if (!s.locked && s.active !== val) toggleStage(i); });
}

function updateCounter() {
  const active = STAGES.filter(s => s.active).length;
  const total = STAGES.length;
  document.getElementById('counter-text').textContent = active + ' of ' + total + ' stages active';
}

function confirmConfig() {
  const phases = {}, checkpoints = {};
  STAGES.forEach(s => {
    phases[s.id] = s.active;
    if (s.active && s.gates && s.gates.length) {
      const cp = {};
      s.gates.forEach(g => { cp[g.id] = g.active; });
      checkpoints[s.id] = cp;
    }
  });
  const deploy = document.querySelector('input[name="deploy"]:checked').value;
  const ctx = document.getElementById('extra-context').value.trim();
  const payload = JSON.stringify({ phases, checkpoints, deployment_target: deploy, additional_context: ctx }, null, 2);

  const ta = document.createElement('textarea');
  ta.value = payload;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);

  const btn = document.getElementById('confirm-btn');
  btn.textContent = '✓ Workflow locked in';
  btn.classList.add('done');
  btn.disabled = true;
  document.getElementById('success-hint').classList.add('visible');
}

// Deploy option styling
document.getElementById('deploy-grid').addEventListener('change', e => {
  document.querySelectorAll('.deploy-opt').forEach(o => {
    o.classList.toggle('selected', o.querySelector('input') === e.target);
  });
});

buildStages();
</script>
</body>
</html>
