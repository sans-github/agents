<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FEATURE_NAME}}</title>
<style>
:root {
  --accent: #16a34a;
  --accent-light: #dcfce7;
  --accent-mid: #bbf7d0;
  --green: #15803d;
  --green-light: #f0fdf4;
  --text: #0f172a;
  --muted: #64748b;
  --subtle: #94a3b8;
  --border: #e2e8f0;
  --bg: #f0fdf4;
  --white: #ffffff;
  --surface: #f8fafc;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(15,23,42,.06), 0 4px 16px rgba(20,83,45,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── Header ── */
.hero {
  background: #14532d;
  padding: 40px 24px 58px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
/* subtle dot grid */
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,.12) 1px, transparent 1px);
  background-size: 22px 22px;
}
/* bottom fade into bg */
.hero::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 32px;
  background: linear-gradient(to bottom, transparent, rgba(22,163,74,.18));
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 99px; padding: 4px 13px;
  font-size: 11px; font-weight: 700; color: #fff; letter-spacing: .06em;
  text-transform: uppercase; margin-bottom: 14px; position: relative;
}
.hero h1 {
  font-size: clamp(22px, 5vw, 32px); font-weight: 800; color: #fff;
  letter-spacing: -.02em; line-height: 1.2; margin-bottom: 8px; position: relative;
}
.hero p {
  font-size: 14px; color: rgba(255,255,255,.82); max-width: 440px;
  margin: 0 auto 20px; line-height: 1.65; position: relative;
}
.stage-counter {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.18); border-radius: 99px; padding: 5px 14px;
  font-size: 12px; font-weight: 600; color: #fff; position: relative;
}
.counter-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; }

/* ── Main card ── */
.container { max-width: 640px; margin: -24px auto 0; padding: 0 16px; position: relative; }
.card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  border: 1px solid var(--border);
}

/* ── Legend ── */
.legend {
  display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
  padding: 13px 22px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.legend-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--subtle); margin-right: 2px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
.swatch-toggle { width: 28px; height: 16px; border-radius: 99px; background: var(--accent); position: relative; flex-shrink: 0; }
.swatch-toggle::after { content: ''; position: absolute; top: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
.swatch-gate { font-size: 13px; line-height: 1; }

/* ── Section header ── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px 10px;
}
.section-head h2 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--subtle); }
.select-all { font-size: 12px; font-weight: 600; color: var(--accent); cursor: pointer; border: none; background: none; padding: 4px 0; }
.select-all:hover { text-decoration: underline; }

/* ── Stage row ── */
.stage { border-bottom: 1px solid var(--border); }
.stage:last-child { border-bottom: none; }
.stage-row {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 22px; cursor: pointer; user-select: none;
  transition: background .12s;
}
.stage.locked .stage-row { cursor: default; }
.stage-row:hover { background: var(--surface); }

.stage-icon {
  width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; background: var(--accent-light);
  transition: background .2s;
}
.stage.inactive .stage-icon { background: #f1f5f9; filter: grayscale(1) opacity(.45); }

.stage-body { flex: 1; min-width: 0; }
.stage-name { font-size: 13px; font-weight: 700; color: var(--text); }
.stage-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.stage.inactive .stage-name { color: var(--subtle); }
.stage.inactive .stage-desc { color: #cbd5e1; }

.always-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .04em;
  color: var(--accent); background: var(--accent-light);
  border-radius: 99px; padding: 3px 9px; white-space: nowrap; flex-shrink: 0;
}

/* Toggle switch */
.toggle {
  width: 38px; height: 21px; border-radius: 99px; flex-shrink: 0;
  background: var(--accent); border: none; cursor: pointer;
  position: relative; transition: background .2s;
  box-shadow: 0 1px 4px rgba(22,163,74,.3);
}
.toggle::after {
  content: ''; position: absolute; top: 3px; right: 3px;
  width: 15px; height: 15px; border-radius: 50%; background: #fff;
  transition: right .2s, left .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle.off { background: #e2e8f0; box-shadow: none; }
.toggle.off::after { right: auto; left: 3px; }
.toggle:disabled { opacity: .4; cursor: default; }

/* ── Gate rows ── */
.gates { background: var(--surface); }
.gate-row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 22px 9px 70px;
  border-top: 1px solid var(--border);
  transition: opacity .15s;
}
.gate-row.dimmed { opacity: .3; pointer-events: none; }
.gate-icon { font-size: 13px; flex-shrink: 0; }
.gate-label { flex: 1; font-size: 12px; color: #475569; line-height: 1.4; }
.gate-toggle {
  width: 30px; height: 17px; border-radius: 99px; flex-shrink: 0;
  background: var(--accent); border: none; cursor: pointer;
  position: relative; transition: background .2s;
  box-shadow: 0 1px 3px rgba(22,163,74,.3);
}
.gate-toggle::after {
  content: ''; position: absolute; top: 2px; right: 2px;
  width: 13px; height: 13px; border-radius: 50%; background: #fff;
  transition: right .2s, left .2s;
  box-shadow: 0 1px 2px rgba(0,0,0,.18);
}
.gate-toggle.off { background: #e2e8f0; box-shadow: none; }
.gate-toggle.off::after { right: auto; left: 2px; }
.gate-toggle:disabled { opacity: .4; cursor: default; }

/* ── Config section ── */
.config-section { padding: 18px 22px; border-top: 1px solid var(--border); }
.config-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--subtle); margin-bottom: 11px; display: block; }
.deploy-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.deploy-opt {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 13px; border: 1.5px solid var(--border);
  border-radius: 9px; cursor: pointer;
  font-size: 12px; font-weight: 500; color: var(--muted);
  background: var(--white);
  transition: border-color .12s, background .12s, color .12s;
  user-select: none;
}
.deploy-opt:hover { border-color: var(--accent); color: var(--accent); }
.deploy-opt.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 700; }
.deploy-opt input { display: none; }
.deploy-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
textarea.context-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 9px;
  padding: 10px 13px; font-size: 12px; font-family: inherit;
  color: var(--text); resize: vertical; min-height: 68px;
  outline: none; transition: border-color .12s;
  background: var(--surface);
}
textarea.context-input:focus { border-color: var(--accent); background: #fff; }
textarea.context-input::placeholder { color: var(--subtle); }

/* ── Footer ── */
.footer { padding: 18px 22px 22px; border-top: 1px solid var(--border); }
.confirm-btn {
  width: 100%; padding: 13px 24px;
  background: var(--accent);
  color: #fff; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: -.01em;
  transition: filter .15s, transform .1s, box-shadow .15s;
  box-shadow: 0 4px 14px rgba(22,163,74,.3);
}
.confirm-btn:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,163,74,.38); }
.confirm-btn:active { transform: translateY(0); }
.confirm-btn.done {
  background: var(--green);
  box-shadow: 0 4px 12px rgba(22,163,74,.28);
}
.success-hint {
  display: none; text-align: center; margin-top: 12px;
  font-size: 12px; color: var(--muted); line-height: 1.5;
}
.success-hint strong { color: var(--text); }
.success-hint.visible { display: block; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">⚡ Workflow Setup</div>
  <h1>{{FEATURE_NAME}}</h1>
  <p>{{PROJECT_SUMMARY}}</p>
  <div class="stage-counter">
    <span class="counter-dot"></span>
    <span id="counter-text">Loading...</span>
  </div>
</div>

<div class="container">
  <div class="card">

    <div class="legend">
      <span class="legend-label">Legend</span>
      <span class="legend-item"><span class="swatch-toggle"></span> Toggle a whole stage on / off</span>
      <span class="legend-item"><span class="swatch-gate">👤</span> Human review gate inside a stage</span>
    </div>

    <div class="section-head">
      <h2>Delivery Stages</h2>
      <button class="select-all" onclick="setAll(true)">Enable all</button>
    </div>

    <div id="stages-list"></div>

    <div class="config-section">
      <span class="config-label">Where does this ship?</span>
      <div class="deploy-grid" id="deploy-grid">
        <label class="deploy-opt selected"><input type="radio" name="deploy" value="local" checked><span class="deploy-dot"></span>Local only</label>
        <label class="deploy-opt"><input type="radio" name="deploy" value="existing AWS infra"><span class="deploy-dot"></span>Existing AWS</label>
        <label class="deploy-opt"><input type="radio" name="deploy" value="new AWS infra"><span class="deploy-dot"></span>New AWS infra</label>
        <label class="deploy-opt"><input type="radio" name="deploy" value="TBD"><span class="deploy-dot"></span>TBD</label>
      </div>
    </div>

    <div class="config-section" style="padding-top:0">
      <span class="config-label">Anything Claude should know upfront?</span>
      <textarea class="context-input" id="extra-context" placeholder="Sketch notes, constraints, tech decisions, team preferences… or leave blank."></textarea>
    </div>

    <div class="footer">
      <button class="confirm-btn" id="confirm-btn" onclick="confirmConfig()">Lock in my workflow →</button>
      <p class="success-hint" id="success-hint">
        ✅ Copied to clipboard. Switch back to Claude and type <strong>done</strong> to continue.
      </p>
    </div>

  </div>
</div>

<script>
const STAGE_ICONS = ['🔍','🎨','🏗️','⚙️','🧪','📦','📝','🚀'];

const STAGES = {{STAGES_JSON}};

function buildStages() {
  const list = document.getElementById('stages-list');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage' + (s.locked ? ' locked' : '') + (!s.active ? ' inactive' : '');
    el.dataset.idx = i;

    const gatesHtml = (s.gates || []).map((g, gi) => `
      <div class="gate-row${!s.active ? ' dimmed' : ''}" id="gate-${i}-${gi}">
        <span class="gate-icon">👤</span>
        <span class="gate-label">${g.label}</span>
        <button class="gate-toggle${g.active ? '' : ' off'}${s.locked ? '' : ''}"
          ${s.locked ? 'disabled' : ''}
          onclick="toggleGate(event,${i},${gi})" title="${g.active ? 'Skip this review' : 'Enable this review'}"></button>
      </div>`).join('');

    el.innerHTML = `
      <div class="stage-row" onclick="${s.locked ? '' : 'toggleStage(' + i + ')'}">
        <div class="stage-icon">${STAGE_ICONS[i] || '📌'}</div>
        <div class="stage-body">
          <div class="stage-name">${s.name}</div>
          <div class="stage-desc">${s.desc}</div>
        </div>
        ${s.locked
          ? '<span class="always-badge">Always on</span>'
          : `<button class="toggle${s.active ? '' : ' off'}" onclick="event.stopPropagation();toggleStage(${i})" title="${s.active ? 'Skip this stage' : 'Enable this stage'}"></button>`}
      </div>
      ${gatesHtml ? '<div class="gates">' + gatesHtml + '</div>' : ''}`;
    list.appendChild(el);
  });
  updateCounter();
}

function toggleStage(i) {
  const s = STAGES[i];
  s.active = !s.active;
  const el = document.querySelector('.stage[data-idx="' + i + '"]');
  el.classList.toggle('inactive', !s.active);
  el.querySelector('.toggle').classList.toggle('off', !s.active);
  el.querySelectorAll('.gate-row').forEach(r => r.classList.toggle('dimmed', !s.active));
  el.querySelectorAll('.gate-toggle').forEach(b => b.disabled = !s.active);
  updateCounter();
}

function toggleGate(e, si, gi) {
  e.stopPropagation();
  const g = STAGES[si].gates[gi];
  g.active = !g.active;
  document.getElementById('gate-' + si + '-' + gi).querySelector('.gate-toggle').classList.toggle('off', !g.active);
}

function setAll(val) {
  STAGES.forEach((s, i) => { if (!s.locked && s.active !== val) toggleStage(i); });
}

function updateCounter() {
  const active = STAGES.filter(s => s.active).length;
  const total = STAGES.length;
  document.getElementById('counter-text').textContent = active + ' of ' + total + ' stages active';
}

function confirmConfig() {
  const phases = {}, checkpoints = {};
  STAGES.forEach(s => {
    phases[s.id] = s.active;
    if (s.active && s.gates && s.gates.length) {
      const cp = {};
      s.gates.forEach(g => { cp[g.id] = g.active; });
      checkpoints[s.id] = cp;
    }
  });
  const deploy = document.querySelector('input[name="deploy"]:checked').value;
  const ctx = document.getElementById('extra-context').value.trim();
  const payload = JSON.stringify({ phases, checkpoints, deployment_target: deploy, additional_context: ctx }, null, 2);

  const ta = document.createElement('textarea');
  ta.value = payload;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);

  const btn = document.getElementById('confirm-btn');
  btn.textContent = '✓ Workflow locked in';
  btn.classList.add('done');
  btn.disabled = true;
  document.getElementById('success-hint').classList.add('visible');
}

// Deploy option styling
document.getElementById('deploy-grid').addEventListener('change', e => {
  document.querySelectorAll('.deploy-opt').forEach(o => {
    o.classList.toggle('selected', o.querySelector('input') === e.target);
  });
});

buildStages();
</script>
</body>
</html>
